server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — every unknown path serves index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container (service name "backend").
    # Docker's embedded DNS, plus a variable in proxy_pass, so the upstream is
    # resolved per request. Without this nginx caches the backend's IP at
    # startup and answers 502 forever after `docker compose up -d --build
    # backend` hands the container a new address.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream backend;

    location /api/ {
        proxy_pass http://$backend_upstream:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Long-cache hashed static assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
