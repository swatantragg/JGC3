# Full stack: Postgres + FastAPI backend + React (nginx) frontend.
#   docker compose up --build
# Frontend:  http://localhost:8080
# Backend:   http://localhost:8000  (docs at /docs)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jaikvin
      POSTGRES_PASSWORD: jaikvin
      POSTGRES_DB: jaikvin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jaikvin"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://jaikvin:jaikvin@db:5432/jaikvin
      CORS_ORIGINS: http://localhost:8090,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    # Host port is overridable and defaults to 8001 to avoid clashing with any
    # other service already on 8000. The container still listens on 8000, and
    # the frontend reaches it over the internal network (backend:8000).
    ports:
      - "${BACKEND_PORT:-8001}:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""   # empty → browser calls same-origin /api, nginx proxies to backend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8090}:80"

volumes:
  pgdata:
