# Full stack: FastAPI backend + React (nginx) frontend.
#   docker compose up --build
# Frontend:  http://localhost:8090
# Backend:   http://localhost:8001  (docs at /docs)
#
# The database comes from backend/.env, which is mounted into the container —
# one file is the single source of truth for both `python run.py` and Docker,
# so the two never drift onto different databases. That file currently points
# at Neon; drop the bundled Postgres in by starting the optional `db` profile
# and setting DATABASE_URL to postgresql+psycopg2://jaikvin:jaikvin@db:5432/jaikvin
#
#   docker compose --profile local-db up --build
services:
  db:
    # Optional: only starts with `--profile local-db`.
    profiles: ["local-db"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jaikvin
      POSTGRES_PASSWORD: jaikvin
      POSTGRES_DB: jaikvin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jaikvin"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    # Read-only mount: DATABASE_URL, CORS_ORIGINS and JWT_SECRET all come from
    # here. Nothing is set under `environment:` because a real environment
    # variable would silently win over the file.
    volumes:
      - ./backend/.env:/app/.env:ro
    # Host port is overridable and defaults to 8001 to avoid clashing with any
    # other service already on 8000. The container still listens on 8000, and
    # the frontend reaches it over the internal network (backend:8000).
    ports:
      - "${BACKEND_PORT:-8001}:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""   # empty → browser calls same-origin /api, nginx proxies to backend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8090}:80"

volumes:
  pgdata:
